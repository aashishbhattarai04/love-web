<!DOCTYPE html>
<html>
<head>
    <title>Proposal ❤️</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:pink;
            padding-top:100px;
        }

        #proposal{
            display:none;
            margin-top:30px;
            font-size:22px;
            color:#d1005b;
        }

        button{
            padding:12px 30px;
            font-size:20px;
            border:none;
            border-radius:30px;
            background:#ff4d88;
            color:white;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h1>🌹 Will You Be Mine? ❤️</h1>

<button onclick="showProposal()">
YES ❤️
</button>

<div id="proposal">
    <h2>🥹 Thank You!</h2>
    <p>
        You just made my day! ❤️<br><br>
        I promise to respect you, care for you,
        and stay by your side through every moment. 🌹
    </p>
</div>

<script>
function showProposal(){
    document.getElementById("proposal").style.display="block";
}
</script>

</body>
</html>
